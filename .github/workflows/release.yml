name: Release

# Triggered manually by a maintainer when ready to cut a release.
# Before running: bump `version` in Cargo.toml on main and merge it.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release — must already match Cargo.toml (e.g. 0.2.4, no v prefix)"
        required: true

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /Users/runner/.cargo
  CARGO_INCREMENTAL: 0
  CACHE_ON_FAILURE: false

jobs:
  # ── 1. Sanity-check: Cargo.toml version must match the input ────────────────
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Version matches Cargo.toml
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$cargo_version" != "$INPUT_VERSION" ]; then
            echo "Cargo.toml version ($cargo_version) does not match input ($INPUT_VERSION)"
            echo "Bump version in Cargo.toml on main first, then re-run this workflow."
            exit 1
          fi
          echo "Version $cargo_version confirmed"

  # ── 2. Build macOS binaries (both architectures) ────────────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tachikoma-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tachikoma-macos-x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip and stage binary
        run: |
          strip target/${{ matrix.target }}/release/tachikoma
          cp target/${{ matrix.target }}/release/tachikoma ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 3. Tag + publish GitHub Release ─────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create and push git tag
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${INPUT_VERSION}"
          git push origin "v${INPUT_VERSION}"

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Tachikoma v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            tachikoma-macos-arm64/tachikoma-macos-arm64
            tachikoma-macos-x86_64/tachikoma-macos-x86_64
